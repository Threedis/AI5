<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Expense Verification System</title>
  <meta http-equiv="refresh" content="0;url=ExpenseVerification/index.html">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #F5F9FC;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; flex-direction: column; gap: 16px;
      color: #605e5c;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.2rem; font-weight: 700; color: #323130;
    }
    .brand-icon {
      width: 42px; height: 42px; border-radius: 10px;
      background: linear-gradient(135deg, #0078D4, #038387);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1.2rem;
    }
    .spin {
      width: 32px; height: 32px;
      border: 3px solid #E1EAEF;
      border-top-color: #0078D4;
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: .875rem; }
    a { color: #0078D4; }
  </style>
</head>
<body>
  <div class="brand">
    <div class="brand-icon">🛡️</div>
    ExpenseVerify
  </div>
  <div class="spin"></div>
  <p>Redirecting… <a href="ExpenseVerification/index.html">Click here if not redirected</a></p>
  <script>
    window.location.replace('ExpenseVerification/index.html');
  </script>
</body>
</html>
