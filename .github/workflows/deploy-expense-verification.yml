name: Deploy ExpenseVerification to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'ExpenseVerification/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload ExpenseVerification as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy only the ExpenseVerification subdirectory
          path: ExpenseVerification

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
