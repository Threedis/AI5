<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — ExpenseVerify</title>
  <link rel="stylesheet" href="css/theme.css">
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg, #F5F9FC);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; flex-direction: column;
      text-align: center; padding: 24px; box-sizing: border-box;
    }
    .err-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: #EEF6FF; display: flex; align-items: center;
      justify-content: center; font-size: 2rem;
      color: #0078D4; margin: 0 auto 24px;
    }
    h1 { font-size: 2.5rem; font-weight: 700; color: #323130; margin: 0 0 8px; }
    p  { color: #605e5c; font-size: 1rem; max-width: 380px; line-height: 1.6; margin: 0 auto 28px; }
    a  {
      display: inline-flex; align-items: center; gap: 8px;
      background: #0078D4; color: #fff; text-decoration: none;
      padding: 10px 22px; border-radius: 6px; font-weight: 600; font-size: .9rem;
      transition: background .15s;
    }
    a:hover { background: #106EBE; }
  </style>
</head>
<body>
  <div class="err-icon">⚠️</div>
  <h1>404</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="index.html">← Go to Home</a>
  <script>
    // Auto-redirect to login after 5 seconds
    let s = 5;
    const p = document.querySelector('p');
    const iv = setInterval(() => {
      s--;
      p.textContent = `The page you're looking for doesn't exist. Redirecting in ${s}s…`;
      if (s <= 0) { clearInterval(iv); window.location.href = 'index.html'; }
    }, 1000);
  </script>
</body>
</html>
