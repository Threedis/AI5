<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Expense Verification System</title>
  <meta name="description" content="Enterprise bank verification system for employee expense management.">
  <!-- Fallback redirect for no-JS environments -->
  <meta http-equiv="refresh" content="0;url=login.html">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #F5F9FC;
      color: #605e5c; flex-direction: column; gap: 16px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.2rem; font-weight: 700; color: #323130; margin-bottom: 8px;
    }
    .brand-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, #0078D4, #038387);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1.1rem;
    }
    .spin {
      width: 32px; height: 32px;
      border: 3px solid #E1EAEF;
      border-top-color: #0078D4;
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: .875rem; }
    noscript p {
      background: #FEF3EE; border: 1px solid #F7C8B8; border-radius: 6px;
      padding: 12px 16px; color: #C75000; max-width: 340px; text-align: center; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="brand">
    <div class="brand-icon">🛡️</div>
    ExpenseVerify
  </div>
  <div class="spin"></div>
  <p>Loading…</p>
  <noscript>
    <p>JavaScript is required to run this application. Please enable JavaScript in your browser and refresh the page.</p>
  </noscript>
  <script>
    (function () {
      try {
        var raw = sessionStorage.getItem('evs_session') || localStorage.getItem('evs_session');
        if (raw) {
          var s = JSON.parse(raw);
          if (!s.expires || Date.now() < s.expires) {
            window.location.replace('dashboard.html');
            return;
          }
        }
      } catch (e) { /* fall through */ }
      window.location.replace('login.html');
    })();
  </script>
</body>
</html>
